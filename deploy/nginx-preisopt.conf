server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 1m;

    # Wenn das Backend nicht antwortet (502/503/504), das Session-Cookie
    # invalidieren. So landet ein neu ladender Browser mit sauberem Zustand
    # auf der Login-Seite, statt in einer Schleife mit einer Session, die
    # gegen ein nicht erreichbares Backend nichts ausrichten kann.
    error_page 502 = @bad_gateway;
    error_page 503 = @bad_gateway;
    error_page 504 = @bad_gateway;

    location @bad_gateway {
        # Cookie-Name entspricht dem Default der Starlette-SessionMiddleware
        # ("session"). Path/Flags spiegeln das Set-Cookie des Backends, damit
        # der Browser den Eintrag wirklich loescht.
        add_header Set-Cookie "session=; Path=/; Max-Age=0; HttpOnly; SameSite=Lax" always;
        add_header Content-Type "text/html; charset=utf-8" always;
        return 502 '<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><title>502 – Backend nicht erreichbar</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"></head><body style="font-family:system-ui,sans-serif;max-width:32rem;margin:4rem auto;padding:1rem;color:#222"><h1 style="margin-top:0">Backend nicht erreichbar</h1><p>Der Anwendungsdienst antwortet gerade nicht. Deine Session wurde zur Sicherheit zurückgesetzt.</p><p>Bitte in einem Moment <a href="/">neu laden</a>.</p></body></html>';
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Fehler vom Upstream (Backend down, Timeout etc.) in den
        # @bad_gateway-Handler leiten; dort wird das Cookie geloescht.
        proxy_intercept_errors on;
    }
}
