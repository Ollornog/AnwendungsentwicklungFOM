<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a8df5"/>
      <stop offset="100%" stop-color="#7a5af5"/>
    </linearGradient>
  </defs>
  <!-- abgerundetes Viereck als Hintergrund -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- Euro-Zeichen -->
  <text x="16" y="22" font-family="Helvetica,Arial,sans-serif"
        font-size="20" font-weight="700" fill="#fff" text-anchor="middle">€</text>
  <!-- kleine Trendlinie unterhalb des € als Anspielung auf Preisoptimierung -->
  <polyline points="7,26 11,24 15,25 19,22 23,23 26,20"
            fill="none" stroke="#fff" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
</svg>
