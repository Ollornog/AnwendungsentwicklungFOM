<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produkte – Preisoptimierung</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="container">
    <ul><li><strong>Preisoptimierung</strong></li></ul>
    <ul>
      <li><a href="/pages/products.html">Produkte</a></li>
      <li><a href="/pages/settings.html">Einstellungen</a></li>
      <li><button class="secondary outline" @click="$store.auth.logout()">Logout</button></li>
    </ul>
  </nav>

  <main class="container" x-data="productsApp()" x-init="load()">

    <!-- Schmale Sim-Leiste oben -->
    <div class="sim-bar">
      <button type="button"
              class="outline"
              style="padding:0.2rem 0.6rem; font-size:0.8rem; margin:0"
              @click="togglePause()"
              :title="paused ? 'Simulation fortsetzen' : 'Simulation pausieren'"
              x-text="paused ? '▶' : '⏸'"></button>
      <label>
        <span class="muted">Stunde</span>
        <input type="range" min="0" max="23" x-model.number="sim.hour">
        <strong x-text="String(sim.hour).padStart(2,'0') + ':00'"></strong>
      </label>
      <label>
        <span class="muted">Tag</span>
        <input type="range" min="1" max="31" x-model.number="sim.day">
        <strong x-text="sim.day"></strong>
      </label>
      <small class="muted" style="margin-left:auto"
             x-text="paused ? 'pausiert' : 'Tick 2 s · 0 → Refill'"></small>
    </div>

    <!-- Produkt-Liste -->
    <div @product-created.window="onProductCreated($event.detail)"
         @strategy-saved.window="onStrategySaved($event.detail)">
      <p x-show="loading" aria-busy="true">Lade…</p>
      <p x-show="!loading && products.length === 0" class="muted">
        Noch keine Produkte. Klick auf das <strong>+</strong> rechts unten.
      </p>
      <div style="overflow-x:auto" x-show="products.length > 0">
        <table class="compact">
          <thead>
            <tr>
              <th>Produkt</th>
              <th>EK</th>
              <th>Wettb.</th>
              <th>Lager (akt./Start)</th>
              <th>Verbr.</th>
              <th>Strategie</th>
              <th>Verkaufspreis</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in products" :key="p.id">
              <tr>
                <td>
                  <strong x-text="p.name"></strong>
                  <br><small class="muted" x-text="p.category"></small>
                </td>
                <td x-text="formatEur(p.cost_price)"></td>
                <td x-text="p.competitor_price != null ? formatEur(p.competitor_price) : '—'"></td>
                <td style="min-width:9rem">
                  <input type="range" min="0" :max="Math.max(1, p.stock)" x-model.number="p._current_stock">
                  <small><span x-text="p._current_stock"></span> / <span x-text="p.stock"></span></small>
                </td>
                <td style="min-width:6rem">
                  <input type="range" min="0" max="20" x-model.number="p._usage">
                  <small x-text="p._usage"></small>
                </td>
                <td><small x-text="strategyLabel(p)"></small></td>
                <td class="price" x-text="formatPrice(priceFor(p))"></td>
                <td class="actions">
                  <button class="outline" @click="openStrategyModal(p)" title="Preis-Strategie festlegen">Strategie</button>
                  <button class="secondary outline" @click="computeAndConfirm(p)"
                          :title="savedAt === p.id ? 'In Historie gespeichert' : 'Aktuellen Preis in die Historie schreiben'"
                          x-text="savedAt === p.id ? '✓ gespeichert' : 'speichern'"></button>
                  <a :href="`/pages/history.html?id=${p.id}`" role="button" class="secondary outline" title="Preishistorie">Historie</a>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
      <small class="error" x-show="error" x-text="error"></small>
    </div>

    <!-- Floating Action Button: Produkt anlegen -->
    <button class="fab"
            @click="window.dispatchEvent(new CustomEvent('open-create-modal'))"
            title="Produkt anlegen"
            aria-label="Produkt anlegen">+</button>

    <!-- Anlegen-Modal -->
    <div x-data="productCreateModal()"
         @open-create-modal.window="show()"
         x-show="open"
         x-cloak
         class="modal-backdrop">
      <article>
        <header><strong>Produkt anlegen</strong></header>
        <form @submit.prevent="submit">
          <div class="grid">
            <label>Name <input type="text" x-model="name" required></label>
            <label>Kategorie <input type="text" x-model="category" required></label>
          </div>
          <div class="grid">
            <label>Einkaufspreis (EUR)
              <input type="number" step="0.01" min="0" x-model="cost_price" required>
            </label>
            <label>Wettbewerbspreis (EUR)
              <input type="number" step="0.01" min="0" x-model="competitor_price">
            </label>
            <label>Nachfrage / Monat
              <input type="number" min="0" step="1" x-model="monthly_demand">
            </label>
          </div>
          <div class="grid">
            <label>Startbestand
              <input type="number" min="0" step="1" x-model="stock" required>
            </label>
            <label>Verbrauch / Tick
              <input type="number" min="0" step="1" x-model="daily_usage">
            </label>
          </div>
          <label>Kontext (für KI-Vorschlag)
            <textarea rows="3" x-model="context"
              placeholder="Produkt, Wettbewerb, Zielgruppe, Tagesprofil …"></textarea>
          </label>
          <small class="error" x-show="error" x-text="error"></small>
          <footer>
            <button type="button" class="secondary" @click="cancel()">Abbrechen</button>
            <button type="submit" :disabled="loading" :aria-busy="loading">Anlegen</button>
          </footer>
        </form>
      </article>
    </div>

    <!-- Preis-Strategie-Modal -->
    <div x-data="priceStrategyModal()"
         @open-strategy-modal.window="openFor($event.detail)"
         x-show="open"
         x-cloak
         class="modal-backdrop">
      <article>
        <header>
          <strong>Preis festlegen:</strong> <span x-text="product?.name"></span>
        </header>

        <fieldset>
          <label>
            <input type="radio" value="fix" x-model="target"> Fixpreis
          </label>
          <label>
            <input type="radio" value="formula" x-model="target"> Formel
          </label>
        </fieldset>

        <div x-show="target === 'fix'">
          <label>Betrag (EUR)
            <input type="number" step="0.01" min="0" x-model="amount">
          </label>
        </div>

        <div x-show="target === 'formula'">
          <label>Formel
            <input type="text" x-model="expression" x-ref="expressionInput"
                   placeholder="z. B. cost_price * 1.8 + (hour >= 18) * 2">
          </label>
          <div class="token-bar">
            <template x-for="t in tokens" :key="t.label">
              <button type="button"
                      class="outline"
                      :class="'token-' + t.kind"
                      @click="insertToken(t.insert)"
                      x-text="t.label"></button>
            </template>
          </div>
          <small class="muted">Klick auf einen Button fügt das Token an der Cursor-Position ein.</small>
        </div>

        <fieldset>
          <label><input type="checkbox" x-model="useAi"> Per KI vorschlagen</label>
          <label x-show="useAi" style="margin-left:1.5rem">
            <input type="checkbox" x-model="online"> Online recherchieren
          </label>
          <div x-show="useAi">
            <button type="button" class="secondary"
                    @click="askAi()" :disabled="aiLoading" :aria-busy="aiLoading">KI fragen</button>
            <div x-show="aiPrompt || aiReasoning" style="margin-top:0.6rem">
              <label>
                <span class="badge-ai">Prompt</span> Frage an die KI
                <textarea readonly rows="6" x-text="aiPrompt" style="font-family:ui-monospace,monospace; font-size:0.8rem"></textarea>
              </label>
              <label>
                <span class="badge-ai">Antwort</span> Begründung
                <textarea readonly rows="3" x-text="aiReasoning" style="font-size:0.85rem"></textarea>
              </label>
            </div>
          </div>
        </fieldset>

        <small class="error" x-show="error" x-text="error"></small>

        <footer>
          <button type="button" class="secondary" @click="cancel()">Abbrechen</button>
          <button type="button" @click="save()" :disabled="saving" :aria-busy="saving">Speichern</button>
        </footer>
      </article>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/formula-eval.js"></script>
  <script src="/js/components/product-create-modal.js"></script>
  <script src="/js/components/price-strategy-modal.js"></script>
  <script>
    function productsApp() {
      return {
        products: [],
        loading: false,
        error: '',
        sim: { hour: 12, day: 15 },
        paused: false,
        savedAt: null, // Produkt-ID, fuer die der "gespeichert"-Badge kurz gezeigt wird
        _tickHandle: null,

        async load() {
          this.loading = true;
          this.error = '';
          try {
            const res = await window.api.get('/products');
            const items = res.items || res || [];
            items.forEach((p) => this._initRuntime(p));
            this.products = items;
            if (this._tickHandle) clearInterval(this._tickHandle);
            this._tickHandle = setInterval(() => this.tick(), 2000);
          } catch (e) {
            this.error = e.message;
          } finally {
            this.loading = false;
          }
        },

        _initRuntime(p) {
          p._current_stock = Number(p.stock) || 0;
          p._usage = Number(p.daily_usage) || 0;
        },

        togglePause() {
          this.paused = !this.paused;
        },

        tick() {
          if (this.paused) return;
          for (const p of this.products) {
            const u = Number(p._usage) || 0;
            let next = Number(p._current_stock) - u;
            if (!Number.isFinite(next) || next <= 0) next = Number(p.stock) || 0;
            p._current_stock = next;
          }
        },

        onProductCreated(p) {
          this._initRuntime(p);
          this.products.unshift(p);
        },

        onStrategySaved(detail) {
          const p = this.products.find((x) => x.id === detail.productId);
          if (p) p.strategy = detail.strategy;
        },

        varsFor(p) {
          return {
            cost_price: Number(p.cost_price),
            competitor_price: p.competitor_price != null ? Number(p.competitor_price) : 0,
            monthly_demand: Number(p.monthly_demand) || 0,
            start_stock: Number(p.stock) || 0,
            stock: Number(p._current_stock) || 0,
            usage: Number(p._usage) || 0,
            hour: Number(this.sim.hour) || 0,
            day: Number(this.sim.day) || 1,
          };
        },

        // Live-Preis: nur fix und formula sind im Browser auswertbar.
        priceFor(p) {
          if (!p.strategy) return null;
          const k = p.strategy.kind;
          if (k === 'fix') {
            const a = Number(p.strategy.config?.amount);
            return Number.isFinite(a) ? a : null;
          }
          if (k === 'formula') {
            try {
              const v = window.evaluateFormula(p.strategy.config?.expression || '', this.varsFor(p));
              return Number.isFinite(v) ? v : null;
            } catch (_) {
              return null;
            }
          }
          return null;
        },

        strategyLabel(p) {
          if (!p.strategy) return '—';
          return ({ fix: 'Fix', formula: 'Formel', rule: 'Regel', llm: 'LLM' })[p.strategy.kind] || p.strategy.kind;
        },

        openStrategyModal(p) {
          window.dispatchEvent(new CustomEvent('open-strategy-modal', { detail: p }));
        },

        async computeAndConfirm(p) {
          if (!p.strategy) {
            this.error = 'Keine Strategie konfiguriert – erst „Strategie" nutzen.';
            return;
          }
          this.error = '';
          try {
            const body = {
              hour: Number(this.sim.hour),
              day: Number(this.sim.day),
              current_stock: Number(p._current_stock),
              usage: Number(p._usage),
            };
            const sugg = await window.api.post(`/products/${p.id}/price`, body);
            await window.api.post(`/products/${p.id}/price/confirm`, {
              suggestion_token: sugg.suggestion_token,
            });
            this.savedAt = p.id;
            setTimeout(() => { if (this.savedAt === p.id) this.savedAt = null; }, 1800);
          } catch (e) {
            this.error = e.message;
          }
        },

        formatEur(n) {
          if (n == null) return '—';
          return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(n);
        },

        formatPrice(n) {
          if (n == null || !Number.isFinite(n)) return '—';
          return this.formatEur(Math.max(0, n));
        },
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
