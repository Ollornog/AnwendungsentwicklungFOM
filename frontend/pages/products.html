<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produkte – Preisoptimierung</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <nav class="container">
    <ul><li><strong>Preisoptimierung</strong></li></ul>
    <ul>
      <li><a href="/pages/products.html">Produkte</a></li>
      <li><button class="secondary outline" @click="$store.auth.logout()">Logout</button></li>
    </ul>
  </nav>

  <main class="container" x-data="productList()" x-init="load()">
    <h1>Produkte</h1>

    <article x-data="productForm((p) => $dispatch('product-created', p))">
      <h2>Produkt anlegen</h2>
      <form @submit.prevent="submit">
        <div class="grid">
          <label>Name <input type="text" x-model="name" required></label>
          <label>Kategorie <input type="text" x-model="category" required></label>
        </div>
        <div class="grid">
          <label>Einkaufspreis (EUR) <input type="number" step="0.01" x-model="cost_price" required></label>
          <label>Lagerbestand <input type="number" min="0" x-model="stock" required></label>
          <label>Wettbewerbspreis (optional) <input type="number" step="0.01" x-model="competitor_price"></label>
        </div>
        <button type="submit" :disabled="loading" :aria-busy="loading">Anlegen</button>
        <small class="error" x-show="error" x-text="error"></small>
      </form>
    </article>

    <article @product-created.window="products.unshift($event.detail)">
      <h2>Liste</h2>
      <p x-show="loading" aria-busy="true">Lade…</p>
      <p x-show="!loading && products.length === 0" class="muted">Noch keine Produkte.</p>
      <table x-show="products.length > 0">
        <thead>
          <tr>
            <th>Name</th><th>Kategorie</th><th>Einkaufspreis</th><th>Lager</th><th>Wettbewerb</th><th></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="p in products" :key="p.id">
            <tr>
              <td x-text="p.name"></td>
              <td x-text="p.category"></td>
              <td x-text="formatEur(p.cost_price)"></td>
              <td>
                <input type="number" min="0" :value="p.stock"
                       @change="updateStock(p, $event.target.value)" style="max-width:6rem">
              </td>
              <td x-text="p.competitor_price != null ? formatEur(p.competitor_price) : '—'"></td>
              <td><a :href="`/pages/product-detail.html?id=${p.id}`" role="button" class="outline">Details</a></td>
            </tr>
          </template>
        </tbody>
      </table>
      <small class="error" x-show="error" x-text="error"></small>
    </article>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/components/product-form.js"></script>
  <script>
    function productList() {
      return {
        products: [], loading: false, error: '',
        async load() {
          this.loading = true; this.error = '';
          try {
            const res = await window.api.get('/products');
            this.products = res.items || res || [];
          } catch (e) { this.error = e.message; }
          finally { this.loading = false; }
        },
        async updateStock(product, newValue) {
          try {
            const updated = await window.api.put(`/products/${product.id}`, { stock: Number(newValue) });
            Object.assign(product, updated);
          } catch (e) { this.error = e.message; }
        },
        formatEur(n) {
          return new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR' }).format(n);
        },
      };
    }
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
